<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Sport Leveling</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#22c55e" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <h1>SYSTEM</h1>

  <button onclick="toggleTheme()">SWITCH COLOR</button>

  <div id="hud"></div>

  <h2>Quêtes</h2>
  <div id="quests"></div>

  <h2>Ajouter une quête</h2>
  <input id="newQuest" placeholder="Nouvelle quête" />
  <button onclick="addQuest()">ADD</button>

  <script src="script.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>
</body>
</html>
