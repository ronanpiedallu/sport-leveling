<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sport Leveling</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#22c55e" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<h1>SYSTEM</h1>

<button onclick="toggleTheme()">SWITCH COLOR</button>

<div id="hud"></div>

<div id="xpBar">
  <div id="xpFill"></div>
</div>

<p id="timer"></p>

<h2>DAILY QUESTS</h2>
<div id="quests"></div>

<h2>CUSTOM QUEST</h2>
<input id="newQuest" placeholder="Nouvelle quête" />
<button onclick="addCustomQuest()">ADD</button>

<script src="script.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
